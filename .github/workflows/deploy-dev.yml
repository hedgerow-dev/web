name: Deploy dev preview

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy to preview channel (dev)
    runs-on: ubuntu-latest
    if: github.repository == 'hedgerow-dev/web'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to preview channel
        run: |
          firebase hosting:channel:deploy dev             --project hedgerow-908c7             --expires 30d             --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
