name: Deploy to Firebase Hosting (dev preview)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to hedgerow-dev preview channel
    runs-on: ubuntu-latest
    if: github.repository == 'hedgerow-dev/web-dev'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to preview channel
        run: |
          firebase hosting:channel:deploy dev \
            --project hedgerow-dev \
            --expires 30d \
            --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
