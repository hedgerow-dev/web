name: Quality checks

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Serve site locally
        run: npx serve . -l 3000 &
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 15000

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/thicket/index.html
            http://localhost:3000/rowan/index.html
          configPath: .github/lighthouse/config.json
          uploadArtifacts: true
          temporaryPublicStorage: false

  html-validate:
    name: HTML validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: |
          html-validate \
            index.html \
            thicket/index.html \
            thicket/compare.html \
            thicket/how-it-works.html \
            rowan/index.html \
            2>&1 | tail -20
        continue-on-error: true
